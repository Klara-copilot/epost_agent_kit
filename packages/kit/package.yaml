name: kit
version: "1.1.0"
description: "Kit authoring and CLI development tools for epost_agent_kit"
layer: 1
platforms: [all]

dependencies:
  - core

provides:
  agents:
    - epost-kit-designer
  skills:
    - kit-agents
    - kit-agent-development
    - kit-skill-development
    - kit-hooks
    - kit-cli
    - kit
    - kit-add-agent
    - kit-add-skill
    - kit-add-hook
    - kit-optimize-skill
    - kit-verify

files:
  agents/: agents/
  skills/: skills/

settings_strategy: skip
claude_snippet: CLAUDE.snippet.md
