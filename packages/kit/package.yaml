name: kit
version: "2.0.0"
description: "Kit authoring and CLI development tools for epost_agent_kit"
layer: 1
platforms: [all]

dependencies:
  - core

provides:
  agents: []
  skills:
    - skill-creator
    - kit-add-agent
    - kit-add-skill
    - kit-add-hook
    - kit-optimize
    - kit-agent-development
    - kit-hooks
    - kit-agents
    - kit-cli
    - kit-verify

files:
  agents/: agents/
  skills/: skills/
  hooks/: hooks/
  settings.json: settings.json

settings_strategy: merge
claude_snippet: CLAUDE.snippet.md
