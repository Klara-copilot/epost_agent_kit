name: ui-ux
version: "1.0.0"
description: "UI/UX design system: component knowledge, Figma-to-code pipeline, design token architecture for klara-theme, ios-theme, android-theme"
layer: 2
platforms: [web, ios, android]

dependencies:
  - core

provides:
  agents:
    - epost-muji
  skills:
  - muji-klara-theme
    - muji-ios-theme
    - muji-android-theme
    - muji/figma-variables
    - web/klara-theme
    - web/figma-integration
  commands:
    - docs/component
    - design/fast

files:
  agents/: agents/
  skills/: skills/
  commands/: commands/

settings_strategy: merge
claude_snippet: CLAUDE.snippet.md
