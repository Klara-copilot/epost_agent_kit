name: a11y
version: "2.0.0"
description: "Accessibility: WCAG 2.1 AA auditing, fixing, and guidance (iOS, Android, Web)"
layer: 1
platforms: [all]

dependencies:
  - core

provides:
  agents:
    - epost-a11y-specialist
  skills:
    - core-a11y
    - ios-a11y
    - android-a11y
    - web-a11y
  commands:
    - audit/a11y
    - audit/a11y-close
    - fix/a11y
    - fix/a11y-batch
    - review/a11y

files:
  agents/: agents/
  skills/: skills/
  commands/: commands/
  assets/: assets/

settings_strategy: skip
claude_snippet: CLAUDE.snippet.md
