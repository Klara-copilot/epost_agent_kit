name: a11y
version: "1.0.0"
description: "Accessibility: WCAG 2.1 AA auditing, fixing, and guidance (iOS, Android, Web)"
layer: 1
platforms: [all]

dependencies:
  - core

provides:
  agents:
    - epost-a11y-specialist
  skills:
    - ios/accessibility
  commands:
    - review/a11y
    - ios/a11y/audit
    - ios/a11y/fix
    - ios/a11y/fix-batch
    - ios/a11y/review
    - ios/a11y/close

files:
  agents/: agents/
  skills/: skills/
  commands/: commands/

settings_strategy: skip
claude_snippet: CLAUDE.snippet.md
