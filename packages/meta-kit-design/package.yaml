name: meta-kit-design
version: "1.0.0"
description: "Kit designer tools: agent/skill development, MCP management, codebase exploration"
layer: 2
platforms: [all]

dependencies:
  - core

provides:
  agents:
    - epost-scout
    - epost-mcp-manager
  commands:
    - meta/generate-command
    - generate-command/splash
    - generate-command/simple
  skills:
    - agents/claude/agent-development
    - agents/claude/skill-development
    - agents/mental-model
    - command-development

files:
  agents/: agents/
  skills/: skills/
  commands/: commands/

settings_strategy: skip
claude_snippet: CLAUDE.snippet.md
