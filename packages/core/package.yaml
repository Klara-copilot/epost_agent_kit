name: core
version: "2.0.0"
description: "Universal agents, cross-cutting skills, smart hub command"
layer: 0
platforms: [all]

dependencies: []

provides:
  agents:
    - epost-orchestrator
    - epost-architect
    - epost-implementer
    - epost-reviewer
    - epost-debugger
    - epost-tester
    - epost-researcher
    - epost-documenter
    - epost-git-manager
    - epost-brainstormer
  skills:
    - core
    - code-review
    - debugging
    - problem-solving
    - error-recovery
    - repomix
    - docs-seeker
    - sequential-thinking
    - research
    - knowledge-retrieval
    - knowledge-capture
    - doc-coauthoring
    - infra-cloud
    - infra-docker
    - data-store
    - subagent-driven-development
    - skill-discovery
    - auto-improvement
    - cook
    - fix
    - plan
    - test
    - debug
    - scout
    - convert
    - epost
    - bootstrap
    - git
    - review
    - docs
    - audit
    - get-started
scripts:
  - get-active-plan.cjs
  - set-active-plan.cjs
  - complete-plan.cjs
  - archive-plan.cjs
  - agent-profiler.cjs
  - check-coverage.cjs
  - scan-secrets.cjs
  - detect-improvements.cjs
  - generate-skill-index.cjs
  - validate-skill-connections.cjs
  - validate-command-descriptions.cjs
  - validate-role-scenarios.cjs

files:
  agents/: agents/
  skills/: skills/
  hooks/: hooks/
  scripts/: scripts/
  output-styles/: output-styles/
  workflows/: workflows/
  assets/: assets/
  settings.json: settings.json
  .ck.json: .ck.json
  .ckignore: .ckignore

renames:
