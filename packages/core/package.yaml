name: core
version: "2.0.0"
description: "Universal agents, cross-cutting skills, smart hub command"
layer: 0
platforms: [all]

dependencies: []

provides:
  agents:
    - epost-planner
    - epost-fullstack-developer
    - epost-code-reviewer
    - epost-debugger
    - epost-tester
    - epost-researcher
    - epost-docs-manager
    - epost-git-manager
  skills:
    - core
    - code-review
    - clean-code
    - error-recovery
    - repomix
    - knowledge
    - journal
    - subagents-driven
    - skill-discovery
    - cook
    - fix
    - plan
    - test
    - debug
    - git
    - docs
    - audit
    - get-started
    - tdd
    - thinking
    - preview
    - security
    - loop
    - deploy
    - research
    - retro
    - find-skill
    - whatsnew
    - didyouknow
    - kit-verify
scripts:
  - verify.cjs
  - get-active-plan.cjs
  - set-active-plan.cjs
  - complete-plan.cjs
  - archive-plan.cjs
  - generate-skill-index.cjs
  - run-skill-eval.cjs
  - run-skill-eval-all.cjs
  - run-skill-benchmark.cjs
  - run-skill-optimize.cjs
  - run-skill-improve-desc.cjs
  - run-skill-report.cjs
  - run-skill-package.cjs

files:
  agents/: agents/
  rules/: rules/
  skills/: skills/
  hooks/: hooks/
  scripts/: scripts/
  output-styles/: output-styles/
  assets/: assets/
  settings.json: settings.json
  statusline.cjs: statusline.cjs
  .epost-kit.json: .epost-kit.json
  .epost-ignore: .epost-ignore

renames:
  skills:
    databases: infra-docker

settings_strategy: base
claude_snippet: CLAUDE.snippet.md
copilot_snippet: COPILOT.snippet.md
cursor_snippet: CURSOR.snippet.md
