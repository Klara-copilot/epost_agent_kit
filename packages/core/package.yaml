name: core
version: "2.0.0"
description: "Universal agents, cross-cutting skills, smart hub command"
layer: 0
platforms: [all]

dependencies: []

provides:
  agents:
    - epost-project-manager
    - epost-planner
    - epost-fullstack-developer
    - epost-code-reviewer
    - epost-debugger
    - epost-tester
    - epost-researcher
    - epost-docs-manager
    - epost-git-manager
    - epost-brainstormer
    - epost-journal-writer
    - epost-mcp-manager
  skills:
    - core
    - code-review
    - problem-solving
    - error-recovery
    - repomix
    - docs-seeker
    - sequential-thinking
    - research
    - knowledge-retrieval
    - knowledge-capture
    - doc-coauthoring
    - infra-cloud
    - infra-docker
    - data-store
    - subagent-driven-development
    - skill-discovery
    - auto-improvement
    - cook
    - fix
    - plan
    - test
    - debug
    - scout
    - convert
    - epost
    - bootstrap
    - git
    - review
    - docs
    - audit
    - get-started
scripts:
  - get-active-plan.cjs
  - set-active-plan.cjs
  - complete-plan.cjs
  - archive-plan.cjs
  - generate-skill-index.cjs

files:
  agents/: agents/
  skills/: skills/
  hooks/: hooks/
  scripts/: scripts/
  output-styles/: output-styles/
  assets/: assets/
  settings.json: settings.json
  .epost-kit.json: .epost-kit.json
  .epost-ignore: .epost-ignore

renames:
  skills:
    databases: infra-docker

settings_strategy: base
claude_snippet: CLAUDE.snippet.md
