name: core
version: "2.0.0"
description: "Universal agents, cross-cutting skills, smart hub command"
layer: 0
platforms: [all]

dependencies: []

provides:
  agents:
    - epost-orchestrator
    - epost-architect
    - epost-implementer
    - epost-reviewer
    - epost-debugger
    - epost-tester
    - epost-researcher
    - epost-documenter
    - epost-git-manager
    - epost-brainstormer
    - epost-guide
    - epost-scout
  skills:
    - core
    - code-review
    - debugging
    - planning
    - problem-solving
    - error-recovery
    - repomix
    - docs-seeker
    - sequential-thinking
    - research
    - knowledge-base
    - knowledge-retrieval
    - knowledge-capture
    - doc-coauthoring
    - infra-cloud
    - infra-docker
    - data-store
  commands:
    - epost
    - bootstrap/fast
    - bootstrap/parallel
    - cook/fast
    - cook/parallel
    - docs/init
    - docs/update
    - docs/component
    - fix/ci
    - fix/fast
    - fix/deep
    - fix/logs
    - fix/test
    - fix/types
    - fix/ui
    - git/commit
    - git/pr
    - git/push
    - plan/fast
    - plan/deep
    - plan/parallel
    - plan/validate
    - review/code

files:
  agents/: agents/
  skills/: skills/
  commands/: commands/
  hooks/: hooks/
  scripts/: scripts/
  output-styles/: output-styles/
  workflows/: workflows/
  settings.json: settings.json
  .ck.json: .ck.json
  .ckignore: .ckignore

renames:
  skills:
    core-a11y: a11y
    databases: infra-docker

settings_strategy: base
