description: "iOS: Swift 6, SwiftUI, UIKit, XCTest"
layer: 1
platforms: [ios]

dependencies:
  - core

provides:
  agents:
    - epost-ios-developer
  skills:
    - ios/development
    - ios/accessibility
    - ios/ui-lib
    - ios/rag
  commands:
    - ios/cook
    - ios/test
    - ios/debug
    - ios/simulator
    - ios/a11y/audit
    - ios/a11y/fix
    - ios/a11y/fix-batch
    - ios/a11y/review

files:
  agents/: agents/
  skills/: skills/
  commands/: commands/ios/

settings_strategy: merge
claude_snippet: CLAUDE.snippet.md
