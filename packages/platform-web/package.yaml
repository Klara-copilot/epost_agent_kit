name: platform-web
version: "2.0.0"
description: "Web: Next.js 14, React 18, TypeScript, Tailwind CSS"
layer: 1
platforms: [web]

dependencies:
  - core

provides:
  agents:
    - epost-web-developer
  skills:
    - web-nextjs
    - web-frontend
    - web-api-routes
    - web-modules
    - web-prototype
    - web-rag
  commands:
    - web/cook
    - web/test
    - web/debug
    - web/convert
    - web/new-module

files:
  agents/: agents/
  skills/: skills/
  commands/: commands/web/

settings_strategy: merge
claude_snippet: CLAUDE.snippet.md
