config:
  multi_select: true   # Allow selecting multiple profiles
  dedup: true           # Deduplicate packages across profiles

profiles:
  # ─── Web Teams (Miracle, Helios, Titan) ───
  web-fullstack:
    display_name: "Web Fullstack Developer"
    teams: [miracle, helios, titan]
    packages: [core, platform-web, platform-backend, domains, a11y, design-system]

  # ─── Mobile Teams (Optimus) ───
  ios-b2c:
    display_name: "iOS App Developer"
    teams: [optimus]
    packages: [core, platform-ios, domains, a11y, design-system]

  android-b2c:
    display_name: "Android App Developer"
    teams: [optimus]
    packages: [core, platform-android, domains, a11y, design-system]

  # ─── Backend/API Teams (Hacka, Kepler) ───
  backend-api:
    display_name: "Backend API Developer"
    teams: [hacka, kepler]
    packages: [core, platform-backend, domains]

  # ─── UI Library Teams (MUJI) ───
  web-ui-lib:
    display_name: "Web UI Library Developer"
    teams: [muji]
    packages: [core, platform-web, design-system]
    optional: [a11y]

  ios-ui-lib:
    display_name: "iOS UI Library Developer"
    teams: [muji]
    packages: [core, platform-ios, design-system]
    optional: [a11y]

  android-ui-lib:
    display_name: "Android UI Library Developer"
    teams: [muji]
    packages: [core, platform-android, design-system]
    optional: [a11y]

  # ─── Architecture Teams ───
  cloud-architect:
    display_name: "Cloud Architect"
    teams: [future, invisible]
    packages: [core, platform-backend]

  # ─── Kit Development ───
  kit-designer:
    display_name: "Kit Designer"
    packages: [core, kit]

  # ─── Full ───
  full:
    display_name: "Full Kit (everything)"
    packages: [core, a11y, platform-web, platform-ios, platform-android, platform-backend, design-system, domains, kit]

auto_detect:
  rules:
    - match:
        files: ["next.config.*"]
        dependencies: ["next"]
      suggest: web-fullstack

    - match:
        files: ["pom.xml"]
        directories: ["src/main/java"]
      suggest: backend-api

    - match:
        files: ["*.xcodeproj"]
        directories: ["*Theme*", "*theme*"]
      suggest: ios-ui-lib

    - match:
        files: ["*.xcodeproj"]
      suggest: ios-b2c

    - match:
        files: ["build.gradle.kts"]
        directories: ["*theme*"]
      suggest: android-ui-lib

    - match:
        files: ["build.gradle.kts"]
        directories: ["app/src/main/"]
      suggest: android-b2c

    - match:
        files: ["*.tf", "cloudbuild.yaml"]
      suggest: cloud-architect
